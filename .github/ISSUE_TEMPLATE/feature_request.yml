name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出功能建议！请说明使用场景和期望行为。
  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: 你希望解决什么问题？现有方案有何不足？
      placeholder: 例如：当前无法在 Camel 中直接调用某类 Python 库...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你期望的功能或 API 长什么样
      placeholder: |
        例如：
        ```camel
        import { xxx } from new_module
        func main() { ... }
        ```
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他方案
    validations:
      required: false
